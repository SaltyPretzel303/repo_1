- step: 
    name: repo_1_step
    environment: ec2-instance
    image: python 
    command: 
      - echo "yo from repo_1" 

- endpoint: 
    name: main-point 
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.7
    server-command: uvicorn predict:app --host 0.0.0.0 --port 8000
    files: 
      - name: model 
        path: model.h5
- step: 
    name: step_1
    environment: manual-gpu
    image: python 
    command: 
      - echo "step_1 fourth_commit" 
      - echo '{"value":"12"}'

- step: 
    name: step_2
    environment: manual-gpu
    image: python 
    command: 
      - echo "step_2 fourth_commit" 
    parameters: 
      - name: main_param
        default: "2"

- pipeline: 
    name: commit_pipe
    nodes: 
      - name: node_1
        step: step_1
        type: execution
        commit: 370a20f179040e76cf2432aca89c2fc9f80a4cab

      - name: node_2
        step: step_2
        type: execution 
        commit: 4aab59c27d5c522905871329694f33cfaa74dbc2

    edges: 
      - [node_1.metadata.value, node_2.parameter.main_param]
